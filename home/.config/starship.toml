add_newline = false
format = "$directory$git_branch$git_status${custom.git_metrics}$cmd_duration$line_break$character"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"

[cmd_duration]
format = "[$duration]($style) "

[directory]
style = "cyan bold"
format = " [$path]($style) "
truncate_to_repo = false

[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "fg:#ea9a97 bold" # Rose color for git branch

[git_status]
disabled = true # We disable the default git_status since our custom.git_metrics handles files + diffs

[custom.git_metrics]
description = "Git additions/deletions metrics"
command = '''
files=$(git status --porcelain 2>/dev/null | wc -l | tr -d ' ')
if [ "$files" -gt 0 ]; then
  numstat=$(git diff HEAD --numstat 2>/dev/null)
  additions=$(echo "$numstat" | awk '{sum+=$1} END {print sum}')
  deletions=$(echo "$numstat" | awk '{sum+=$2} END {print sum}')
  additions=${additions:-0}
  deletions=${deletions:-0}
  printf " %d • \033[32m+%d\033[0m \033[31m-%d\033[0m" "$files" "$additions" "$deletions"
fi
'''
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[$output]($style) "
style = "bold white"
