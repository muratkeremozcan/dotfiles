onboarding = false
[keys]
prefix = "ctrl+b"
focus_pane_left  = "prefix+h"
focus_pane_down  = "prefix+j"
focus_pane_up    = "prefix+k"
focus_pane_right = "prefix+l"
split_vertical    = "prefix+d"        # side-by-side, mirrors WezTerm's Cmd+d
split_horizontal = "prefix+shift+d"   # stacked, mirrors WezTerm's Cmd+Shift+d
new_tab   = "prefix+t"                # mirrors WezTerm's Cmd+t
close_tab = "prefix+ampersand"
workspace_picker = "prefix+w"
close_workspace = "prefix+shift+m"    # moved off shift+d to free it for split_horizontal
goto             = "prefix+g"
copy_mode  = "prefix+y"  # herdr's copy-mode entry key; copy-mode's own internal keys (v/space select, y/Enter copy, q/Esc cancel) aren't configurable
