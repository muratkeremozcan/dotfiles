# Enable 24-bit color (TrueColor) and support italic fonts
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Change prefix from Ctrl+b to Ctrl+a (optional, but highly recommended)
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Start window and pane numbering at 1 (more ergonomic)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Disable escape delay (essential for Vim/Neovim responsiveness)
set -sg escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Enable mouse support (scrolling, selecting, pane resizing)
set -g mouse on

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Vi keys in copy mode
setw -g mode-keys vi
bind-T copy-mode-vi v send-keys -X begin-selection
bind-T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Intuitive splits using | and - and preserve current directory path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload configuration easily
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded!"

# Clean and simple styling (rose-pine-moon inspired colors)
set -g status-style "bg=#232534,fg=#e0def4"
set -g status-left "#[fg=#ea9a97,bold] #S #[fg=#393b4e]│ "
set -g status-right "#[fg=#9ccfd8]%Y-%m-%d #[fg=#393b4e]│ #[fg=#c4a7e7]%H:%M "
set -g window-status-format "#[fg=#6e6a86] #I: #W "
set -g window-status-current-format "#[fg=#e0def4,bg=#393b4e,bold] #I: #W "
set -g pane-border-style "fg=#393b4e"
set -g pane-active-border-style "fg=#c4a7e7"
set -g message-style "bg=#2a2c3c,fg=#e0def4"
